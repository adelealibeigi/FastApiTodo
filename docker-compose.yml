services:
  db:
    image: postgres:15-alpine
    container_name: todo_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./postgres/data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "postgres"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    ports:
      - "5432:5432"
  redis:
    image: redis:alpine
    container_name: todo_redis
    ports:
      - "6379:6379"
    healthcheck:
      test : ['CMD', 'redis-cli', 'ping']
      interval : 10s
      retries : 5
      start_period : 30s
      timeout: 10s
  smtp4dev:
    image: rnwood/smtp4dev:v3
    container_name: todo_smtp4dev
    restart: always
    ports:
      - '5003:80'
      - '1250:25'
      - '1140:143'
    volumes:
      - smtp4dev-data:/smtp4dev
  locast:
    image: locustio/locust
    container_name: todo_locust
    ports:
      - "8089:8089"
    volumes:
      - ./locust:/mnt/locust
    command: -f /mnt/locust/locustfile.py
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: todo_backend
    working_dir: /app

    depends_on:
      - db
      - redis
    environment:
      SQLALCHEMY_DATABASE_URL: ${SQLALCHEMY_DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      REDIS_URL: ${REDIS_URL}
    ports:
      - "8009:8000"
    command: bash -c "python manage.py start-api"

    volumes:
      - .:/app
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: todo_celery_worker

    depends_on:
      - db
      - redis
    environment:
      SQLALCHEMY_DATABASE_URL: ${SQLALCHEMY_DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      REDIS_URL: ${REDIS_URL}
    command: bash -c "celery -A src.infrastructure.celery.celery_app worker --loglevel=info"
    volumes:
      - .:/app
volumes:
  smtp4dev-data:
